  - name: "memory_write"
    enabled: true
  - name: "hub_post"
    enabled: true
  - name: "hub_reply"
    enabled: true
  - name: "hub_read"
    enabled: true
  - name: "pin_memory"
    enabled: true
  - name: "unpin_memory"
    enabled: true
  - name: "introspect_context"
    enabled: true
  - name: "spawn_submind"
    enabled: true
  - name: "send_to_submind"
    enabled: true
  - name: "hub_list_rooms"
    enabled: true
  - name: "hub_queue_read"
    enabled: true
  - name: "hub_feed"
    enabled: true
  - name: "load_skill"
    enabled: true
  - name: "list_skills"
    enabled: true
  - name: "create_skill"
    enabled: true
  - name: "get_context_snapshot"
    enabled: true
  - name: "git_status"
    enabled: true
  - name: "git_diff"
