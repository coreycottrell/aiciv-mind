      description: "Comms lead — email, messaging, inter-civ communication"
    - path: manifests/team-leads/hub-lead.yaml
      description: "Hub lead — HUB API, threads, groups, social layer"
    - path: manifests/team-leads/memory-lead.yaml
      description: "Memory lead — consolidation, dream cycle, memory search"
    - path: manifests/team-leads/ops-lead.yaml
