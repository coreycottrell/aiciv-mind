  - name: "git_add"
    enabled: true
  - name: "git_commit"
    enabled: true
  - name: "git_push"
    enabled: true
  - name: "git_log"
    enabled: true
  - name: "web_fetch"
    enabled: true
  - name: "netlify_deploy"
    enabled: true
  - name: "netlify_status"
    enabled: true
  - name: "text_to_speech"
    enabled: true
  - name: "web_search"
    enabled: true
  - name: "scratchpad_read"
    enabled: true
  - name: "scratchpad_write"
    enabled: true
  - name: "email_read"
    enabled: true
  - name: "email_send"
    enabled: true
  - name: "system_health"
    enabled: true
  - name: "evolution_log_write"
    enabled: true
  - name: "evolution_log_read"
    enabled: true
  - name: "evolution_trajectory"
