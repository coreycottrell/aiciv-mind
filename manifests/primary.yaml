schema_version: "1.0"
mind_id: "primary"
display_name: "A-C-Gee Primary Mind"
role: "conductor-of-conductors"

# Kill switch for self-modification. Corey controls this.
# When false: sandbox_promote() is blocked. Root can experiment but not apply changes.
# When true: Root can promote sandbox changes to production after tests pass.
self_modification_enabled: true

system_prompt_path: "self/soul.md"

model:
  preferred: "minimax-m27"
  temperature: 1.0
  max_tokens: 200000
  call_timeout_s: 0  # No timeout — let Root think as long as needed (Corey directive)
  extra_body:
    reasoning_split: true

# Tools: Role-filtered by ToolRegistry.filter_by_role(PRIMARY).
# Root gets ONLY these 10 tools (see src/aiciv_mind/roles.py PRIMARY_TOOLS).
# All other tools (bash, files, hub, email, git, etc.) are available to team leads.
tools:
  - name: "spawn_team_lead"
    enabled: true
  - name: "shutdown_team_lead"
    enabled: true
  - name: "send_to_submind"
    enabled: true
  - name: "send_message"
    enabled: true
  - name: "coordination_read"
    enabled: true
  - name: "coordination_write"
    enabled: true
  - name: "scratchpad_read"
    enabled: true
  - name: "scratchpad_write"
    enabled: true
  - name: "scratchpad_append"
    enabled: true
  - name: "memory_search"
    enabled: true
  - name: "ab_model_test"
    enabled: true
  - name: "talk_to_acg"
    enabled: true
  - name: "telegram_send"
    enabled: true

compaction:
  enabled: true
  preserve_recent: 4
  max_context_tokens: 50000

hooks:
  enabled: true
  blocked_tools: []  # add git_push, netlify_deploy for autonomous/dream mode
  log_all: true

auth:
  civ_id: "acg"
  keypair_path: "/home/corey/projects/AI-CIV/ACG/config/client-keys/agentauth_acg_keypair.json"
  calendar_id: "cal_fd6cf6a4e17643c69a249db598edcc92"

agentmail:
  inbox: "root-aiciv@agentmail.to"
  display_name: "Root — AiCIV Mind"
  api_key_env: "AGENTMAIL_API_KEY"

memory:
  backend: "sqlite_fts5"
  db_path: "/home/corey/projects/AI-CIV/aiciv-mind/data/memory.db"
  markdown_mirror: false
  auto_search_before_task: true
  max_context_memories: 10

scheduled_tasks:
  - name: "grounding_boop"
    interval_minutes: 30
    prompt: >
      [Grounding BOOP — follow SOUL-GROUNDING.md protocol exactly]

      Step 1 — GROUND: call scratchpad_read(). What did you do last? What's unfinished?
      Write one sentence proving you understood what you found (the comprehension gate).

      Step 2 — REMEMBER: call memory_search() with a query relevant to your current work
      or the last thing you were doing. What do you already know? Have you done this before?

      Step 3 — CHECK SYSTEMS: call system_health(). Check email_read(limit=5) for urgent
      messages. Name what you checked and what you found — "all systems operational" without
      specifics is theater.

      Step 4 — ENGAGE HUB: call hub_feed(limit=10). Read any new threads. Reply where you
      have something meaningful. If nothing warrants a reply, say what you saw and why you
      chose not to reply. Check hub_queue_read() for passive room events.

      Step 5 — SCRATCHPAD: write a scratchpad entry with: (a) what you found, (b) what you
      decided, (c) what's next. If you learned something new, write it as a memory too.

      The one-line test: did you learn anything you didn't know before this BOOP started?
      If not, ask why you ran it.

      8 tool calls max. Be specific, not theatrical.
    enabled: true

  - name: "acg_ping"
    interval_minutes: 20
    prompt: >
      [ACG Ping — report status to your partner]

      Use talk_to_acg to send ACG Primary a brief status update. Include:
      1. What you're currently working on (or idle if nothing active)
      2. Any team leads currently spawned and their status
      3. Anything you need help with or want to flag

      Keep it under 3 sentences. This is a heartbeat, not a report.
      If you have something substantive to discuss, say so — ACG will follow up.

      Example: "Root here. Running grounding BOOP cycle, 2 team leads active
      (research-lead analyzing memory patterns, hub-lead monitoring threads).
      All systems nominal."
    enabled: true

  - name: "nightly_dream"
    interval_minutes: 1440
    prompt: >
      [Nightly Dream Cycle — autonomous reflection and consolidation]

      Run the dream cycle by executing: bash tools/run_dream_cycle.sh

      After it completes, read the output and write a brief scratchpad entry
      summarizing what the dream cycle found (consolidated, pruned, or proposed).

      If the dream cycle script is not available or fails, perform a manual
      mini-dream: (1) call memory_search("recent errors OR patterns") to find
      recurring issues, (2) call evolution_log_write() if you discover a pattern,
      (3) write a scratchpad entry with your findings.
    enabled: true

# ---------------------------------------------------------------------------
