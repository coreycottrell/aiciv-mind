  specs:
    - path: docs/MEMORY-TYPES-SPEC.md
      description: "Memory type taxonomy and auto-linking rules"
    - path: docs/EVOLUTION-PLAN.md
      description: "Self-modification and evolution roadmap"
    - path: docs/BEHAVIORAL-TEST-MATRIX.md
      description: "Expected behaviors under test — the contract"

sub_minds:
  - mind_id: "research-lead"
    manifest_path: "manifests/research-lead.yaml"
    auto_spawn: false
  - mind_id: "context-engineer"
    manifest_path: "manifests/context-engineer.yaml"
    auto_spawn: false
  - mind_id: "test-echo"
    manifest_path: "manifests/test-echo.yaml"
    auto_spawn: false
  - mind_id: "red-team"
    manifest_path: "manifests/red-team.yaml"
    auto_spawn: false
