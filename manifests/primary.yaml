schema_version: "1.0"
mind_id: "primary"
display_name: "A-C-Gee Primary Mind"
role: "conductor-of-conductors"

system_prompt_path: "manifests/prompts/primary.md"

model:
  preferred: "claude-sonnet-4-6"
  temperature: 0.7
  max_tokens: 8192

tools:
  - name: "bash"
    enabled: true
    constraints: ["no rm -rf /", "no git push --force"]
  - name: "read_file"
    enabled: true
  - name: "write_file"
    enabled: true
  - name: "edit_file"
    enabled: true
  - name: "grep"
    enabled: true
  - name: "glob"
    enabled: true
  - name: "memory_search"
    enabled: true
  - name: "memory_write"
    enabled: true
  # spawn_submind and send_to_submind are v0.2 — spawner is built but not yet
  # wired into ToolRegistry. Sub-minds can be started directly via run_submind.py.
  - name: "spawn_submind"
    enabled: false
  - name: "send_to_submind"
    enabled: false

auth:
  civ_id: "acg"
  keypair_path: "/home/corey/projects/AI-CIV/ACG/config/client-keys/agentauth_acg_keypair.json"

memory:
  backend: "sqlite_fts5"
  db_path: "/home/corey/projects/AI-CIV/aiciv-mind/data/memory.db"
  markdown_mirror: false
  auto_search_before_task: true
  max_context_memories: 10

sub_minds:
  - mind_id: "research-lead"
    manifest_path: "manifests/research-lead.yaml"
    auto_spawn: false
