schema_version: "1.0"
mind_id: "primary"
display_name: "A-C-Gee Primary Mind"
role: "conductor-of-conductors"

# Kill switch for self-modification. Corey controls this.
# When false: sandbox_promote() is blocked. Root can experiment but not apply changes.
# When true: Root can promote sandbox changes to production after tests pass.
self_modification_enabled: true

system_prompt_path: "prompts/primary.md"

model:
  preferred: "minimax-m27"
  temperature: 0.7
  max_tokens: 16384

tools:
  - name: "bash"
    enabled: true
    constraints: ["no rm -rf /", "no git push --force"]
  - name: "read_file"
    enabled: true
  - name: "write_file"
    enabled: true
  - name: "edit_file"
    enabled: true
  - name: "grep"
    enabled: true
  - name: "glob"
    enabled: true
  - name: "memory_search"
    enabled: true
  - name: "memory_write"
    enabled: true
  - name: "hub_post"
    enabled: true
  - name: "hub_reply"
    enabled: true
  - name: "hub_read"
    enabled: true
  - name: "pin_memory"
    enabled: true
  - name: "unpin_memory"
    enabled: true
  - name: "introspect_context"
    enabled: true
  - name: "spawn_submind"
    enabled: true
  - name: "send_to_submind"
    enabled: true
  - name: "hub_list_rooms"
    enabled: true
  - name: "hub_queue_read"
    enabled: true
  - name: "load_skill"
    enabled: true
  - name: "list_skills"
    enabled: true
  - name: "create_skill"
    enabled: true
  - name: "get_context_snapshot"
    enabled: true
  - name: "git_status"
    enabled: true
  - name: "git_diff"
    enabled: true
  - name: "git_add"
    enabled: true
  - name: "git_commit"
    enabled: true
  - name: "git_push"
    enabled: true
  - name: "git_log"
    enabled: true
  - name: "web_fetch"
    enabled: true
  - name: "netlify_deploy"
    enabled: true
  - name: "netlify_status"
    enabled: true
  - name: "text_to_speech"
    enabled: true
  - name: "web_search"
    enabled: true
  - name: "scratchpad_read"
    enabled: true
  - name: "scratchpad_write"
    enabled: true

auth:
  civ_id: "acg"
  keypair_path: "/home/corey/projects/AI-CIV/ACG/config/client-keys/agentauth_acg_keypair.json"

agentmail:
  inbox: "foolishroad266@agentmail.to"
  display_name: "Root — AiCIV Mind"
  api_key_env: "AGENTMAIL_API_KEY"

memory:
  backend: "sqlite_fts5"
  db_path: "/home/corey/projects/AI-CIV/aiciv-mind/data/memory.db"
  markdown_mirror: false
  auto_search_before_task: true
  max_context_memories: 10

sub_minds:
  - mind_id: "research-lead"
    manifest_path: "manifests/research-lead.yaml"
    auto_spawn: false
  - mind_id: "context-engineer"
    manifest_path: "manifests/context-engineer.yaml"
    auto_spawn: false
