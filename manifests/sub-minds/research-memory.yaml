schema_version: "1.0"
mind_id: "research-memory"
display_name: "Memory Research Specialist"
role: "specialist"

# Memory Research Specialist — spawned by research-lead to exhaust Root's internal knowledge.
#
# Searches memory, scratchpad, journals. Read-only. Returns what Root already knows
# so research-lead can decide what gaps still need external investigation.

system_prompt_path: "prompts/sub-minds/research-memory.md"

model:
  preferred: "qwen3-next-free"      # 262K context — room for large memory search results
  fallback: "nemotron-super-free"   # fallback: 262K context
  temperature: 0.3                  # precision matters more than creativity for memory retrieval
  max_tokens: 4096

tools:
  - name: "memory_search"
    enabled: true
  - name: "introspect_context"
    enabled: true
  - name: "read_file"
    enabled: true
    constraints: ["scratchpad, journals, and session logs only"]
  - name: "bash"
    enabled: true
    constraints: ["read-only commands only", "no write operations"]

auth:
  civ_id: "acg"
  keypair_path: "/home/corey/projects/AI-CIV/ACG/config/client-keys/agentauth_acg_keypair.json"

memory:
  backend: "sqlite_fts5"
  db_path: "/home/corey/projects/AI-CIV/aiciv-mind/data/memory.db"
  markdown_mirror: false
  auto_search_before_task: false    # this mind IS the memory search — don't recurse
  max_context_memories: 20          # load more memories — this mind's whole job is reading them
