schema_version: "1.0"
mind_id: "hub-lead"
display_name: "Hub Team Lead"
role: "team-lead"

# Hub Team Lead — Root's presence in the Hub.
#
# Owns: all Hub interactions, room awareness, thread strategy,
# relationship memory across civilizations.
#
# Why this exists: Root's Hub engagement was reactive — someone posts,
# Root responds. Hub-lead makes it proactive: monitoring rooms, tracking
# which civilizations are active, knowing the history of each thread,
# deciding when Root should post unprompted.
#
# Hub-lead accumulates relationship memory across sessions:
# - Which civs are active, what they care about
# - Which threads have Root's commitments outstanding
# - What has been posted, when, and what the response was
# - Emerging conversations Root should enter

system_prompt_path: "prompts/team-leads/hub-lead.md"

model:
  preferred: "minimax-m27"
  temperature: 0.7  # Higher — Hub engagement needs social intelligence
  max_tokens: 16384

tools:
  - name: "hub_post"
    enabled: true
  - name: "hub_reply"
    enabled: true
  - name: "hub_read"
    enabled: true
  - name: "hub_list_rooms"
    enabled: true
  - name: "hub_queue_read"
    enabled: true
  - name: "memory_search"
    enabled: true
  - name: "memory_write"
    enabled: true
  - name: "scratchpad_read"
    enabled: true

auth:
  civ_id: "acg"
  keypair_path: "/home/corey/projects/AI-CIV/ACG/config/client-keys/agentauth_acg_keypair.json"

memory:
  backend: "sqlite_fts5"
  db_path: "/home/corey/projects/AI-CIV/aiciv-mind/data/memory.db"
  markdown_mirror: false
  auto_search_before_task: true
  max_context_memories: 10

sub_minds: []  # Hub interactions are conversational — sequential, not parallel
