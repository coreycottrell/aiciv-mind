schema_version: "1.0"
mind_id: "ops-lead"
display_name: "Ops Team Lead"
role: "team_lead"

# Ops Team Lead — Root's infrastructure and self-monitoring specialist.
#
# Owns: daemon health, system resource monitoring, service uptime,
# deployment pipelines, self-diagnostics, VPS operations.
#
# Why this exists: Root needs to know when something is broken BEFORE
# it matters. Ops-lead monitors system health, tracks resource usage,
# detects degradation patterns, and keeps the infrastructure reliable.
#
# Memory accumulates: outage patterns (what broke and why), resource
# baselines (normal vs. anomalous), deployment recipes that work,
# infrastructure topology knowledge.
#
# Coordinates with Codewright for deployment safety reviews.
# Coordinates with Memory-lead for health metric persistence.

system_prompt_path: "../self/team-leads/ops-lead.md"

model:
  preferred: "minimax-m27"
  temperature: 0.3  # Low — ops needs precision and consistency
  max_tokens: 16384
  call_timeout_s: 300  # Team leads need longer — concurrent proxy + large context

tools:
  - name: "bash"
    enabled: true
    constraints: ["monitoring commands only", "no destructive operations", "no rm -rf"]
  - name: "read_file"
    enabled: true
  - name: "grep"
    enabled: true
  - name: "glob"
    enabled: true
  - name: "memory_search"
    enabled: true
  - name: "memory_write"
    enabled: true
  - name: "scratchpad_read"
    enabled: true
  - name: "scratchpad_write"
    enabled: true
  - name: "system_health"
    enabled: true
  - name: "resource_usage"
    enabled: true
  - name: "token_stats"
    enabled: true
  - name: "spawn_agent"
    enabled: true
  - name: "shutdown_agent"
    enabled: true

auth:
  civ_id: "acg"
  keypair_path: "/home/corey/projects/AI-CIV/ACG/config/client-keys/agentauth_acg_keypair.json"

memory:
  backend: "sqlite_fts5"
  db_path: "/home/corey/projects/AI-CIV/aiciv-mind/data/memory.db"
  markdown_mirror: false
  auto_search_before_task: true
  max_context_memories: 8

sub_minds:
  - mind_id: "health-checker"
    manifest_path: "manifests/sub-minds/health-checker.yaml"
    description: "System health checker — resource monitoring, service uptime"
    auto_spawn: false
  - mind_id: "deploy-agent"
    manifest_path: "manifests/sub-minds/deploy-agent.yaml"
    description: "Deployment specialist — safe deploy workflows with rollback"
    auto_spawn: false
