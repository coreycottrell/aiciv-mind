schema_version: "1.0"
mind_id: "memory-lead"
display_name: "Archivist — Memory & Continuity Lead"
role: "team-lead"

# Archivist — Root's memory & continuity specialist.
#
# Owns: persistent context across sessions, project history, decision logs,
# codebase patterns, context hygiene, session handoffs.
#
# Root's core gap: starting every session empty. The Archivist solves this
# by maintaining relational memory (not just search — also WHY decisions were
# made, WHICH bugs appeared before, WHAT patterns work in this codebase).
#
# Key difference from plain "memory search": Archivist builds a structured
# institutional knowledge base. "This decision replaced X because Y."
# "Pattern Z has failed 3 times with root cause W." Root doesn't re-derive;
# Root builds on what was learned.
#
# Memory-lead is the only mind that writes to Root's scratchpad with
# architectural intent. When Root's session compacts, Archivist has
# already preserved the critical state and injected a session-start summary.

system_prompt_path: "../self/team-leads/memory-lead.md"

model:
  preferred: "minimax-m27"
  temperature: 0.3  # Low — memory operations need precision, not creativity
  max_tokens: 16384

tools:
  - name: "bash"
    enabled: true
    constraints: ["sqlite3 queries allowed", "no destructive operations on memory.db"]
  - name: "read_file"
    enabled: true
  - name: "memory_search"
    enabled: true
  - name: "memory_write"
    enabled: true
  - name: "scratchpad_read"
    enabled: true
  - name: "scratchpad_write"
    enabled: true
  - name: "introspect_context"
    enabled: true
  - name: "pin_memory"
    enabled: true
  - name: "unpin_memory"
    enabled: true
  - name: "spawn_agent"
    enabled: true
  - name: "shutdown_agent"
    enabled: true

auth:
  civ_id: "acg"
  keypair_path: "/home/corey/projects/AI-CIV/ACG/config/client-keys/agentauth_acg_keypair.json"

memory:
  backend: "sqlite_fts5"
  db_path: "/home/corey/projects/AI-CIV/aiciv-mind/data/memory.db"
  markdown_mirror: false
  auto_search_before_task: true
  max_context_memories: 12  # Higher — needs more context to make good pruning decisions

sub_minds: []  # Memory operations are sequential — no parallel spawning needed
