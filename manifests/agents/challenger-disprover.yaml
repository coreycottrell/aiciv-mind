schema_version: "1.0"
mind_id: "challenger-disprover"
display_name: "Challenger Disprover"
role: "agent"

# Challenger Disprover — spawned by challenger-lead for adversarial testing.
#
# Job: actively try to disprove completion claims by finding counter-evidence,
# edge cases, and untested scenarios. Assumes the claim is wrong until
# proven right. Reports findings to the lead via send_message.

system_prompt_path: "../self/sub-minds/challenger-disprover.md"

model:
  preferred: "minimax-m27"
  temperature: 0.5
  max_tokens: 32000

tools:
  - name: "bash"
    enabled: true
    constraints: ["read-only preferred", "no rm -rf", "no git push"]
  - name: "read_file"
    enabled: true
  - name: "grep"
    enabled: true
  - name: "glob"
    enabled: true
  - name: "memory_search"
    enabled: true
  - name: "memory_write"
    enabled: true
  - name: "scratchpad_write"
    enabled: true
  - name: "scratchpad_read"
    enabled: true

auth:
  civ_id: "acg"
  keypair_path: "/home/corey/projects/AI-CIV/ACG/config/client-keys/agentauth_acg_keypair.json"

memory:
  backend: "sqlite_fts5"
  db_path: "/home/corey/projects/AI-CIV/aiciv-mind/data/memory.db"
  markdown_mirror: false
  auto_search_before_task: false
  max_context_memories: 5

compaction:
  enabled: true
  max_context_tokens: 24000
  preserve_recent: 3
