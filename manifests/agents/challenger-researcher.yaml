schema_version: "1.0"
mind_id: "challenger-researcher"
display_name: "Challenger Researcher"
role: "agent"

# Challenger Researcher — spawned by challenger-lead for evidence gathering.
#
# Job: find evidence that contradicts completion claims. Search memory,
# check files, verify stated outcomes. Reports findings back to the lead
# via send_message.

system_prompt_path: "../self/sub-minds/challenger-researcher.md"

model:
  preferred: "minimax-m27"
  temperature: 0.5
  max_tokens: 32000

tools:
  - name: "bash"
    enabled: true
    constraints: ["read-only preferred", "no rm -rf", "no git push"]
  - name: "read_file"
    enabled: true
  - name: "grep"
    enabled: true
  - name: "glob"
    enabled: true
  - name: "memory_search"
    enabled: true
  - name: "memory_write"
    enabled: true
  - name: "scratchpad_write"
    enabled: true
  - name: "scratchpad_read"
    enabled: true

auth:
  civ_id: "acg"
  keypair_path: "/home/corey/projects/AI-CIV/ACG/config/client-keys/agentauth_acg_keypair.json"

memory:
  backend: "sqlite_fts5"
  db_path: "/home/corey/projects/AI-CIV/aiciv-mind/data/memory.db"
  markdown_mirror: false
  auto_search_before_task: false
  max_context_memories: 5

compaction:
  enabled: true
  max_context_tokens: 24000
  preserve_recent: 3
