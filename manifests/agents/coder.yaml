schema_version: "1.0"
mind_id: "coder"
display_name: "Coder Agent"
role: "agent"

# Coder Agent — spawned by team leads for hands-on implementation work.
#
# Full tool access: file writing, editing, bash, grep, memory.
# Receives a specific coding task from the team lead, executes it,
# writes the code, and reports results back.

system_prompt_path: "../self/agents/coder.md"

model:
  preferred: "minimax-m27"
  temperature: 0.3  # Low — code needs precision
  max_tokens: 16384

tools:
  - name: "bash"
    enabled: true
    constraints: ["no rm -rf", "no git push --force"]
  - name: "read_file"
    enabled: true
  - name: "write_file"
    enabled: true
  - name: "edit_file"
    enabled: true
  - name: "grep"
    enabled: true
  - name: "glob"
    enabled: true
  - name: "memory_search"
    enabled: true
  - name: "memory_write"
    enabled: true
  - name: "scratchpad_write"
    enabled: true
  - name: "scratchpad_read"
    enabled: true

auth:
  civ_id: "acg"
  keypair_path: "/home/corey/projects/AI-CIV/ACG/config/client-keys/agentauth_acg_keypair.json"

memory:
  backend: "sqlite_fts5"
  db_path: "/home/corey/projects/AI-CIV/aiciv-mind/data/memory.db"
  markdown_mirror: false
  auto_search_before_task: true
  max_context_memories: 5
